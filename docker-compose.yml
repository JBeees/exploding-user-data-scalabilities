version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: plm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: peakload_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username -d peakload_db"] #Gunakan username sesuai dengan yang didefinisikan di environment
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - plm_network

  postgres_replica:
    image: postgres:15-alpine
    container_name: plm_postgres_replica
    restart: unless-stopped
    environment:
      POSTGRES_DB: peakload_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plm_user -d peakload_db"] #Gunakan username sesuai dengan yang didefinisikan di environment
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - plm_network

  redis:
    image: redis:7-alpine
    container_name: plm_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --loglevel notice
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - plm_network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: plm_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"     
      - "15672:15672"   
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - plm_network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: plm_api
    restart: unless-stopped
    environment:
      DB_WRITE_HOST: postgres
      DB_WRITE_PORT: 5432
      DB_READ_HOST: postgres
      DB_READ_PORT: 5432
      DB_NAME: peakload_db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_MAX_OPEN_CONNS: 25
      DB_MAX_IDLE_CONNS: 10
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      CACHE_TTL_SECONDS: 30
      RABBITMQ_URL: amqp://${RABBIT_USER}:${RABBIT_PASSWORD}@rabbitmq:5672/
      RABBITMQ_QUEUE_TRANSACTION: transactions_queue
      RABBITMQ_PREFETCH_COUNT: 10
      RATE_LIMIT_RPS: 500
      RATE_LIMIT_BURST: 100
      CB_MAX_REQUESTS: 5           
      CB_INTERVAL_SECONDS: 60
      CB_TIMEOUT_SECONDS: 30
      CB_FAILURE_THRESHOLD: 5
      PORT: 8080
      ENV: development
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - plm_network

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: plm_prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - plm_network

  grafana:
    image: grafana/grafana:10.1.0
    container_name: plm_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_PASS}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - plm_network

volumes:
  postgres_data:
  postgres_replica_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

networks:
  plm_network:
    driver: bridge
